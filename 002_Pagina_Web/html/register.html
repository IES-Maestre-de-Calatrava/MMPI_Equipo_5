<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro MMPI - Crear Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
   <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" type="image/x-icon" href="../003_MMPI/media/basicos/favicon.ico">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100 py-5">
        <div class="card login-card shadow-lg my-auto">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <div class="logo-wrapper mb-3">
                        <img src="..//003_MMPI/media/basicos/final.png" alt="Logo MMPI" class="app-logo">
                    </div>
                    <h3 class="fw-bold text-dark">Crea tu cuenta</h3>
                    <p class="text-muted small">Únete a la plataforma de movilidad infantil</p>
                </div>

                <form id="formRegistro">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                            <input type="text" id="nombreRegistro" class="form-control bg-light border-0" placeholder="Nombre Completo" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Correo electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="emailRegistro" class="form-control bg-light border-0" placeholder="Correo Electrónico" required>
                        </div>
                    </div>


                    <div class="mb-3">
                        <label class="form-label fw-semibold">¿Quién eres?</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-person-badge"></i></span>
                            <select id="perfilRegistro" class="form-select bg-light border-0" required>
                                <option value="" selected disabled>Selecciona tu perfil</option>
                                <option value="fisio">Fisioterapeuta</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                            <input type="password" id="contrasenaRegistro" class="form-control bg-light border-0" placeholder="Mínimo 8 caracteres" required>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Registrarse</button>
                    </div>
                </form>

                <div class="text-center">
                    <p class="mb-0 small text-muted">¿Ya tienes una cuenta? 
                        <a href="index.html" class="register-link fw-bold">Inicia sesión</a>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
