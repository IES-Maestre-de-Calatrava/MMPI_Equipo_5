<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Paciente - MMPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../styles/inicio.css"> <link rel="stylesheet" href="/styles/detalle.css"> <link rel="icon" type="image/x-icon" href="/media/imgs_important/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container-fluid p-4 bg-dark-blue min-vh-100">
        <header class="header-main d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center gap-3 bg-white rounded-pill px-3 py-2 flex-grow-1 me-5 shadow-sm">
                <img src="../media/imgs_important/final.png" alt="Logo" class="mini-logo">
                <span class="fw-bold fs-5 text-dark">“Equipo_5”</span>
                
                <button class="btn btn-add ms-auto" id="btnAddPatient">
                    <i class="bi bi-plus-circle-fill"></i>
                </button>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-navy"><i class="bi bi-search"></i> Búsqueda</button>
                <button class="btn btn-navy-icon"><i class="bi bi-bell"></i></button>
            </div>
        </header>

        <div class="main-card shadow">
            
            <div class="patient-header-info mb-4">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <div class="avatar-box bg-white p-2 rounded-4">
                            <img id="patient-img" src="../media/imgs/nino.png" alt="Avatar">
                        </div>
                    </div>
                    <div class="col text-white">
                        <h2 class="fw-bold mb-1" id="patient-name">Cargando...</h2>
                        <div class="patient-meta">
                            <p><strong>Edad:</strong> <span id="patient-age">-</span> años</p>
                            <p><strong>Localidad:</strong> <span id="patient-city">-</span></p>
                            <p><strong>Teléfono:</strong> <span id="patient-phone">-</span></p>
                            <p><strong>Padres:</strong> <span id="patient-parents">-</span></p>
                        </div>
                        <span class="badge bg-white text-dark rounded-pill px-3 py-2 mt-2" id="patient-level">Nivel: -</span>
                    </div>
                    <div class="col-auto d-flex flex-column gap-2">
                        <button class="btn btn-light btn-report-custom"><i class="bi bi-file-earmark-pdf"></i> Descargar Reporte Diario</button>
                        <button class="btn btn-light btn-report-custom"><i class="bi bi-file-earmark-pdf"></i> Descargar Reporte Semanal</button>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-2">
                    <button class="btn btn-light w-100 py-3 rounded-4 h-100 fw-bold border-0">
                        <i class="bi bi-calendar3 fs-3 d-block mb-2"></i> Seleccionar Día
                    </button>
                </div>
                <div class="col-md-5">
                    <div class="chart-container bg-white p-3 rounded-4">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="chart-container bg-white p-3 rounded-4">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="observations-section mt-4">
                <div class="obs-header">OBSERVACIONES</div>
                <div class="obs-body position-relative">
                    <textarea id="patient-obs" class="form-control" placeholder="Introduce tus observaciones"></textarea>
                    <button id="btn-save" class="btn btn-save-obs shadow">
                        <i class="bi bi-floppy-fill"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a href="../../../pages/inicio.html" class="btn btn-white-back px-4 shadow-sm">
                <i class="bi bi-reply-fill"></i> Volver a Inicio
            </a>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/charts.js"></script>
</body>
</html>
