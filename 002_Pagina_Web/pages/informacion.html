<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Paciente - MMPI</title>

    <!-- Bootstrap y fuentes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="../styles/inicio.css?v=60">
    <link rel="stylesheet" href="../styles/detalle_info.css?v=60">
    <link rel="stylesheet" href="../styles/reportscss.css?v=60">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../media/imgs_important/favicon.ico">

    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

    <input type="hidden" id="pacienteId" value="">

    <div class="container-fluid p-4 bg-dark-blue min-vh-100">

        <!-- Header superior -->
        <header class="header-main d-flex align-items-center justify-content-between mb-4">

            <div class="d-flex align-items-center gap-3 bg-white rounded-pill px-3 py-2 flex-grow-1 me-5 shadow-sm">
                <img src="../media/imgs_important/final.png" alt="Logo" class="mini-logo">

                <span id="nombreUsuarioHeader" class="fw-bold fs-5 text-dark">
                    Usuario
                </span>

                <button class="btn btn-plus-minimal ms-auto" id="btnAddPatient" title="Registrar nuevo paciente">
                    <i class="bi bi-plus"></i>
                </button>
            </div>

            <div class="d-flex gap-2">
                <a href="inicio.html" class="btn btn-navy">
                    <i class="bi bi-reply-fill"></i> Inicio
                </a>

                <button class="btn btn-navy">
                    <i class="bi bi-search"></i> Búsqueda
                </button>

                <button class="btn btn-navy-icon">
                    <i class="bi bi-bell"></i>
                </button>
            </div>

        </header>

        <!-- Contenedor principal -->
        <div class="main-card shadow">

            <!-- Info del paciente -->
            <div class="patient-header-info mb-4">

                <div class="row align-items-center">

                    <!-- Avatar -->
                    <div class="col-auto">
                        <div class="avatar-box bg-white p-2 rounded-4">
                            <img id="patient-img" src="../media/imgs/nino.png" alt="Avatar">
                        </div>
                    </div>

                    <!-- Datos paciente -->
                    <div class="col text-white">

                        <h2 class="fw-bold mb-1" id="patient-name">
                            Cargando...
                        </h2>

                        <div class="patient-meta">
                            <p><strong>DNI / ID:</strong> <span id="patient-dni">-</span></p>
                            <p><strong>Edad:</strong> <span id="patient-age">-</span> años</p>
                            <p><strong>Localidad:</strong> <span id="patient-city">-</span></p>
                            <p><strong>Teléfono:</strong> <span id="patient-phone">-</span></p>
                            <p><strong>Email:</strong> <span id="patient-email">-</span></p>
                        </div>

                        <span class="badge bg-white text-dark rounded-pill px-3 py-2 mt-2" id="patient-level">
                            Estado: -
                        </span>

                        <div id="patient-warning" class="alert alert-warning py-2 px-3 mt-3 mb-2 fw-bold d-none">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            Datos pendientes de completar
                        </div>

                        <div class="d-flex flex-wrap gap-2 mt-2">
                            <a id="btnCompletarPaciente" href="#" class="btn btn-warning btn-sm fw-bold d-none">
                                <i class="bi bi-pencil-square"></i> Completar datos
                            </a>

                            <a id="btnEditarPaciente" href="#" class="btn btn-outline-light btn-sm fw-bold">
                                <i class="bi bi-pencil"></i> Editar datos
                            </a>
                        </div>

                    </div>

                    <!-- Botones reportes -->
                    <div class="col-auto d-flex flex-column gap-2">

                        <button id="btnReporteDiario" class="btn btn-light btn-report-custom">
                            <i class="bi bi-file-earmark-pdf"></i> Descargar Reporte Diario
                        </button>

                        <button id="btnReporteSemanal" class="btn btn-light btn-report-custom">
                            <i class="bi bi-file-earmark-pdf"></i> Descargar Reporte Semanal
                        </button>

                        <button id="btnReporteGlobal" class="btn btn-light btn-report-custom">
                            <i class="bi bi-file-earmark-pdf"></i> Descargar Reporte Global
                        </button>

                    </div>

                </div>

            </div>

            <!-- Gráficos y calendarios -->
            <div class="row g-3">

                <div class="col-md-2">

                    <div class="calendar-panel">

                        <label for="fechaSeleccionada" class="calendar-label">
                            <i class="bi bi-calendar3"></i> Seleccionar día
                        </label>

                        <input 
                            type="text" 
                            id="fechaSeleccionada" 
                            class="form-control calendar-input" 
                            placeholder="Selecciona un día" 
                            readonly
                        >

                        <label for="semanaVisual" class="calendar-label mt-3">
                            <i class="bi bi-calendar-week"></i> Seleccionar semana
                        </label>

                        <input type="hidden" id="semanaReporte">

                        <input 
                            type="text" 
                            id="semanaVisual" 
                            class="form-control calendar-input" 
                            placeholder="Selecciona una semana" 
                            readonly
                        >

                    </div>

                </div>

                <div class="col-md-5">
                    <div class="chart-container bg-white p-3 rounded-4">
                        <canvas id="pieChart" class="grafica-reporte"></canvas>
                    </div>
                </div>

                <div class="col-md-5">
                    <div class="chart-container bg-white p-3 rounded-4">
                        <canvas id="barChart" class="grafica-reporte"></canvas>
                    </div>
                </div>

            </div>

            <!-- Observaciones -->
            <div class="observations-section mt-4">

                <div class="obs-header">
                    OBSERVACIONES
                </div>

                <div class="obs-body position-relative">

                    <textarea 
                        id="patient-obs" 
                        class="form-control" 
                        placeholder="Introduce tus observaciones"
                    ></textarea>

                    <button id="btn-save" class="btn btn-save-obs shadow">
                        <i class="bi bi-floppy-fill"></i>
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- JS librerías -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <!-- JS propio -->
    <script src="../js/detallePaciente.js?v=60"></script>
    <script src="../js/calendarioSesiones.js?v=60"></script>
    <script src="../js/reports.js?v=60"></script>

</body>
</html>
