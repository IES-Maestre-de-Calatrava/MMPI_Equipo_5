<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - MMPI</title>

    <!-- Bootstrap y fuentes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="../styles/style.css?v=111">
    <link rel="stylesheet" href="../styles/notificaciones.css?v=1">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../media/imgs_important/favicon.ico">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card login-card shadow-lg">

            <div class="card-body p-4 p-md-5">

                <div class="text-center mb-4">

                    <div class="logo-wrapper mb-3">
                        <img src="../media/imgs_important/final.png" alt="Logo MMPI" class="app-logo">
                    </div>

                    <h3 class="fw-bold text-dark">
                        ¿Problemas para entrar?
                    </h3>

                    <p class="text-muted small">
                        Introduce tu correo y te enviaremos un enlace para recuperar el acceso a tu cuenta MMPI.
                    </p>

                </div>

                <form id="formRecuperar">

                    <div class="mb-4">

                        <label for="emailRecuperar" class="form-label fw-semibold">
                            Correo electrónico
                        </label>

                        <div class="input-group">

                            <span class="input-group-text bg-light border-0">
                                <i class="bi bi-envelope"></i>
                            </span>

                            <input 
                                type="email" 
                                id="emailRecuperar" 
                                class="form-control bg-light border-0" 
                                placeholder="Correo electrónico" 
                                required
                            >

                        </div>

                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                            Enviar enlace de acceso
                        </button>
                    </div>

                </form>

                <div class="text-center mt-4">
                    <a href="../index.html" class="register-link fw-bold small">
                        <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
                    </a>
                </div>

            </div>

            <div class="card-footer py-3 text-center bg-transparent border-0">
                <p class="text-muted mb-0" style="font-size: 0.75rem;">
                    Si no recibes el correo, revisa tu carpeta de spam.
                </p>
            </div>

        </div>

    </div>

    <!-- JS propio -->
    <script src="../js/notificaciones.js?v=1"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const formRecuperar = document.getElementById("formRecuperar");

            if (!formRecuperar) {
                return;
            }

            formRecuperar.addEventListener("submit", function (event) {
                event.preventDefault();

                const email = document.getElementById("emailRecuperar").value.trim();

                if (email === "") {
                    mostrarToast("Introduce tu correo electrónico.", "warning");
                    return;
                }

                mostrarToast("Si el correo está registrado, recibirás un enlace de recuperación.", "info");
            });
        });
    </script>

</body>
</html>
