<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Paciente - MMPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../styles/anadir_paciente.css">
    <link rel="icon" type="image/x-icon" href="/media/imgs_important/favicon.ico">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="card registro-card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-5">
                    <img src="/media/imgs_important/final.png" alt="Logo MMPI" class="app-logo mb-3">
                    <h2 class="fw-bold text-dark">Registro de Paciente</h2>
                    <p class="text-muted">Introduce los datos del menor para el seguimiento</p>
                </div>

                <form id="formRegistroPaciente">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">DNI / Identificación</label>
                            <div class="input-group custom-input">
                                <span class="input-group-text"><i class="bi bi-card-text"></i></span>
                                <input type="text" id="dni" class="form-control" placeholder="DNI del paciente" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nombre</label>
                            <div class="input-group custom-input">
                                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold">Apellidos</label>
                            <div class="input-group custom-input">
                                <span class="input-group-text"><i class="bi bi-people-fill"></i></span>
                                <input type="text" id="apellidos" class="form-control" placeholder="Apellidos completos" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Email de contacto</label>
                            <div class="input-group custom-input">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Teléfono</label>
                            <div class="input-group custom-input">
                                <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
                                <input type="tel" id="telefono" class="form-control" placeholder="Teléfono de contacto" required>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold">Domicilio</label>
                            <div class="input-group custom-input">
                                <span class="input-group-text"><i class="bi bi-geo-alt-fill"></i></span>
                                <input type="text" id="direccion" class="form-control" placeholder="Dirección completa" required>
                            </div>
                        </div>
                    </div>

                    <div class="row mt-5 g-2">
                        <div class="col-md-4">
                            <button type="button" id="btnLimpiar" class="btn btn-outline-secondary w-100">
                                <i class="bi bi-eraser"></i> Limpiar
                            </button>
                        </div>
                        <div class="col-md-4">
                            <a href="../pages/inicio.html" class="btn btn-navy-outline w-100">
                                <i class="bi bi-arrow-left"></i> Volver
                            </a>
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-save"></i> Guardar Paciente
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
