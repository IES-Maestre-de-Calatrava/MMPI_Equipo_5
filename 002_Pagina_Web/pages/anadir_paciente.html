<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos del Paciente - MMPI</title>

    <!-- Bootstrap y fuentes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="../styles/anadir_paciente.css?v=108">
    <link rel="stylesheet" href="../styles/notificaciones.css?v=1">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../media/imgs_important/favicon.ico">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">

        <div class="card registro-card shadow-sm border-0">

            <div class="card-body p-4 p-md-5">

                <div class="text-center mb-5">
                    <img src="../media/imgs_important/final.png" alt="Logo MMPI" class="app-logo mb-3">

                    <h2 id="tituloFormularioPaciente" class="fw-bold text-dark">
                        Datos del Paciente
                    </h2>

                    <p id="subtituloFormularioPaciente" class="text-muted">
                        Completa o modifica los datos del menor
                    </p>
                </div>

                <form id="formRegistroPaciente">

                    <!-- Foto de perfil opcional -->
                    <div class="patient-photo-card mb-4">

                        <div class="patient-photo-preview">
                            <img src="../media/imgs/nino.png" alt="Foto de perfil del paciente">
                        </div>

                        <div class="patient-photo-info">

                            <div class="patient-photo-title">
                                <i class="bi bi-image-fill"></i>
                                Foto de perfil opcional
                            </div>

                            <div class="alert alert-secondary patient-photo-alert mb-3">
                                <i class="bi bi-info-circle-fill"></i>
                                Este paciente aún no tiene una foto asignada. Puedes completar sus datos igualmente.
                            </div>

                            <button type="button" class="btn btn-outline-secondary patient-photo-btn" disabled>
                                <i class="bi bi-image"></i>
                                Añadir imagen próximamente
                            </button>

                        </div>

                    </div>

                    <div class="row g-4">

                        <div class="col-md-6">
                            <label for="dni" class="form-label fw-bold">
                                DNI / Identificación
                            </label>

                            <div class="input-group custom-input">
                                <span class="input-group-text">
                                    <i class="bi bi-card-text"></i>
                                </span>

                                <input 
                                    type="text" 
                                    id="dni" 
                                    class="form-control" 
                                    placeholder="DNI del paciente" 
                                    required
                                >
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="nombre" class="form-label fw-bold">
                                Nombre
                            </label>

                            <div class="input-group custom-input">
                                <span class="input-group-text">
                                    <i class="bi bi-person-fill"></i>
                                </span>

                                <input 
                                    type="text" 
                                    id="nombre" 
                                    class="form-control" 
                                    placeholder="Nombre" 
                                    required
                                >
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="apellidos" class="form-label fw-bold">
                                Apellidos
                            </label>

                            <div class="input-group custom-input">
                                <span class="input-group-text">
                                    <i class="bi bi-people-fill"></i>
                                </span>

                                <input 
                                    type="text" 
                                    id="apellidos" 
                                    class="form-control" 
                                    placeholder="Apellidos completos" 
                                    required
                                >
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="edad" class="form-label fw-bold">
                                Edad
                            </label>

                            <div class="input-group custom-input">
                                <span class="input-group-text">
                                    <i class="bi bi-calendar-heart"></i>
                                </span>

                                <input 
                                    type="number" 
                                    id="edad" 
                                    class="form-control" 
                                    placeholder="Edad del paciente" 
                                    min="0" 
                                    max="18" 
                                    required
                                >
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="email" class="form-label fw-bold">
                                Email de contacto
                            </label>

                            <div class="input-group custom-input">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope"></i>
                                </span>

                                <input 
                                    type="email" 
                                    id="email" 
                                    class="form-control" 
                                    placeholder="ejemplo@correo.com" 
                                    required
                                >
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="telefono" class="form-label fw-bold">
                                Teléfono
                            </label>

                            <div class="input-group custom-input">
                                <span class="input-group-text">
                                    <i class="bi bi-telephone-fill"></i>
                                </span>

                                <input 
                                    type="number" 
                                    id="telefono" 
                                    class="form-control" 
                                    placeholder="Teléfono de contacto" 
                                    required
                                >
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label for="localidad" class="form-label fw-bold">
                                Localidad
                            </label>

                            <div class="input-group custom-input">
                                <span class="input-group-text">
                                    <i class="bi bi-geo-alt-fill"></i>
                                </span>

                                <input 
                                    type="text" 
                                    id="localidad" 
                                    class="form-control" 
                                    placeholder="Localidad del paciente" 
                                    required
                                >
                            </div>
                        </div>

                    </div>

                    <div class="row mt-5 g-2">

                        <div class="col-md-4">
                            <button type="button" id="btnLimpiar" class="btn btn-outline-secondary w-100">
                                <i class="bi bi-eraser"></i> Limpiar
                            </button>
                        </div>

                        <div class="col-md-4">
                            <a href="inicio.html" id="btnVolverPaciente" class="btn btn-navy-outline w-100">
                                <i class="bi bi-arrow-left"></i> Volver
                            </a>
                        </div>

                        <div class="col-md-4">
                            <button type="submit" id="btnGuardarPaciente" class="btn btn-primary w-100">
                                <i class="bi bi-save"></i> Guardar cambios
                            </button>
                        </div>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <!-- JS propio -->
    <script src="../js/notificaciones.js?v=1"></script>
    <script src="../js/script.js?v=106"></script>

</body>
</html>
