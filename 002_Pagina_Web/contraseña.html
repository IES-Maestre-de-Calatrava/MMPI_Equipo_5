<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - MMPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../002_Pagina_Web/styles/style.css">
    <link rel="icon" type="image/x-icon" href="..//002_Pagina_Web/media/imgs_important/favicon.ico">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card shadow-lg">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <div class="logo-wrapper mb-3">
                        <!-- Icono de seguridad o Logo MMPI -->
                        <div class="logo-wrapper mb-3">
                        <img src="..//002_Pagina_Web/media/imgs_important/final.png" alt="Logo MMPI" class="app-logo">
                    </div>
                    </div>
                    <h3 class="fw-bold text-dark">¿Problemas para entrar?</h3>
                    <p class="text-muted small">Introduce tu correo y te enviaremos un enlace para recuperar el acceso a tu cuenta MMPI.</p>
                </div>

                <form id="formRecuperar">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Correo electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="emailRecuperar" class="form-control bg-light border-0" placeholder="Correo Electrónico" required>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Enviar enlace de acceso</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <a href="index.html" class="register-link fw-bold small">
                        <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
                    </a>
                </div>

            </div>
            <div class="card-footer py-3 text-center bg-transparent border-0">
                <p class="text-muted" style="font-size: 0.75rem;">Si no recibes el correo, revisa tu carpeta de spam.</p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
