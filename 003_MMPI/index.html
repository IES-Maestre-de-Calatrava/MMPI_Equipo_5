<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login MMPI - Acceso al Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" type="image/x-icon" href="../003_MMPI/media/basicos/favicon.ico">

</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card shadow-lg">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <div class="logo-wrapper mb-3">
                        <img src="..//003_MMPI/media/basicos/final.png" alt="Logo MMPI" class="app-logo">
                    </div>
                    <h3 class="fw-bold text-dark">BIENVENIDO</h3>
                    <p class="text-muted small">Movilidad en la Primera Infancia</p>
                </div>

                <form id="formLogin">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Correo electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="emailLogin" class="form-control bg-light border-0" placeholder="Introduce el correo electrónico" required>
                        </div>
                    </div>
                    
                    <div class="mb-2">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                            <input type="password" id="contrasenaLogin" class="form-control bg-light border-0" placeholder="Introduce la Contraseña" required>
                        </div>
                    </div>

                    <div class="text-end mb-4">
                        <a href="inicio.html" class="forgot-link">PRUEBA A INICIO</a>
                    </div>

                    <div class="text-end mb-4">
                        <a href="contraseña.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>

                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Iniciar Sesión</button>
                    </div>
                </form>

                <div class="text-center position-relative my-4">
                    <hr class="text-muted">
                    <span class="or-separator bg-white px-3 text-muted small"></span>
                </div>

                <div class="text-center">
                    <p class="mb-0">
                        <a href="register.html" class="register-link fw-bold">Regístrate aquí</a>
                    </p>
                </div>

            </div>
            <div class="card-footer py-3 text-center bg-transparent border-0">
                <p class="small text-muted mb-0">Portal de Fisioterapia</p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
